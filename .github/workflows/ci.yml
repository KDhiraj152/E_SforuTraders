name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    name: Backend build and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: invoice-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run tests
        run: ./mvnw -q test

  frontend:
    name: Frontend lint, test, and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: invoice-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: invoice-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  smoke-e2e:
    name: Smoke E2E (auth + create invoice)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: invoice_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Start backend
        working-directory: invoice-backend
        env:
          DB_URL: jdbc:postgresql://localhost:5432/invoice_db
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: ci-smoke-secret-key-ci-smoke-secret-key
          APP_USERNAME: admin
          APP_PASSWORD: admin123
          ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
          SPRING_PROFILES_ACTIVE: dev
        run: |
          ./mvnw -q spring-boot:run > ../backend-smoke.log 2>&1 &
          echo $! > ../backend-smoke.pid

      - name: Wait for backend health
        run: |
          for i in {1..90}; do
            if curl -fsS http://localhost:8080/api/auth/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy in time"
          tail -n 200 backend-smoke.log || true
          exit 1

      - name: Smoke test auth and invoice creation
        run: |
          LOGIN_RESPONSE=$(curl -fsS -X POST http://localhost:8080/api/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"username":"admin","password":"admin123"}')

          TOKEN=$(echo "$LOGIN_RESPONSE" | jq -r '.token')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "Failed to retrieve JWT token from login response"
            echo "$LOGIN_RESPONSE"
            exit 1
          fi

          CREATE_RESPONSE=$(curl -fsS -X POST http://localhost:8080/api/invoices \
            -H "Authorization: Bearer $TOKEN" \
            -H 'Content-Type: application/json' \
            -d '{
              "invoiceDate": "2026-04-01",
              "billedName": "CI Smoke Customer",
              "items": [
                {"description": "Smoke Item", "quantity": 1, "rate": 100}
              ]
            }')

          INVOICE_NO=$(echo "$CREATE_RESPONSE" | jq -r '.invoiceNo')
          if [ -z "$INVOICE_NO" ] || [ "$INVOICE_NO" = "null" ]; then
            echo "Invoice creation response does not contain invoiceNo"
            echo "$CREATE_RESPONSE"
            exit 1
          fi

          echo "Smoke invoice created: $INVOICE_NO"

      - name: Stop backend
        if: always()
        run: |
          if [ -f backend-smoke.pid ]; then
            kill "$(cat backend-smoke.pid)" || true
          fi
