version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: invoice-db
    environment:
      POSTGRES_USER: ${DB_USERNAME?DB_USERNAME is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD?DB_PASSWORD is required}
      POSTGRES_DB: invoice_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME?DB_USERNAME is required}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - invoice-network

  # Spring Boot Backend
  backend:
    build:
      context: .
      dockerfile: invoice-backend/Dockerfile
    container_name: invoice-backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/invoice_db
      DB_USERNAME: ${DB_USERNAME?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD?DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET?JWT_SECRET is required}
      APP_USERNAME: ${APP_USERNAME?APP_USERNAME is required}
      APP_PASSWORD: ${APP_PASSWORD?APP_PASSWORD is required}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost}
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - invoice-network
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: .
      dockerfile: invoice-frontend/Dockerfile
    container_name: invoice-frontend
    ports:
      - "80:80"
    environment:
      VITE_API_URL: http://localhost:8080/api
    depends_on:
      - backend
    networks:
      - invoice-network
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  invoice-network:
    driver: bridge
