# Development Environment Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/invoice_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Server
server.port=8080
server.servlet.context-path=/

# CORS
allowed.origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Logging
logging.level.root=INFO
logging.level.com.sfourtraders=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Application
app.name=Invoice Management System
app.environment=development
app.username=${APP_USERNAME}
app.password=${APP_PASSWORD}
